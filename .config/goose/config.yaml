GOOSE_MODEL: claude-sonnet-4.5
GOOSE_PROVIDER: github_copilot
GOOSE_MODE: auto
OPENAI_HOST: https://api.openai.com
ANTHROPIC_HOST: https://api.anthropic.com
extensions:
  computercontroller:
    bundled: true
    display_name: Computer Controller
    enabled: true
    name: computercontroller
    timeout: 60
    type: builtin
  context7:
    args:
    - -y
    - '@upstash/context7-mcp'
    bundled: null
    cmd: npx
    description: null
    enabled: true
    env_keys: []
    envs: {}
    name: context7
    timeout: 100
    type: stdio
  developer:
    bundled: true
    display_name: Developer Tools
    enabled: true
    name: developer
    timeout: 60
    type: builtin
  mcp-server-git:
    args:
    - mcp-server-git
    bundled: null
    cmd: uvx
    description: null
    enabled: true
    env_keys: []
    envs: {}
    name: mcp-server-git
    timeout: 60
    type: stdio
OPENAI_BASE_PATH: v1/chat/completions